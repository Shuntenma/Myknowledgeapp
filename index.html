<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Mon Carnet"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<title>Mon Carnet de Lecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#F5F0E8;--card:#FFFFFF;--border:#E5E0D8;
    --text:#1A1A2E;--muted:#6B7280;
    --green:#2D6A4F;--purple:#7B4B94;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .serif{font-family:'Lora',Georgia,serif;}
  .fade{animation:fadeIn 0.25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fp{perspective:1000px;}
  .fi{transition:transform 0.55s;transform-style:preserve-3d;position:relative;}
  .fi.flip{transform:rotateY(180deg);}
  .ff{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .fb{transform:rotateY(180deg);}
  .ns::-webkit-scrollbar{display:none;}
  input:focus,textarea:focus{outline:none;}
  button{cursor:pointer;font-family:'Inter',sans-serif;}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-left{display:flex;align-items:center;gap:0.6rem;}
  .topbar-title{font-family:'Lora',Georgia,serif;font-size:1.1rem;font-weight:600;}
  .nav{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem;position:sticky;top:57px;z-index:10;}
  .nav::-webkit-scrollbar{display:none;}
  .nav-btn{display:flex;align-items:center;gap:6px;padding:0.85rem 1.1rem;white-space:nowrap;font-size:13px;font-weight:400;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;}
  .nav-btn.active{font-weight:600;border-bottom:3px solid var(--active-color);}
  .badge-count{border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;}
  .page{max-width:680px;margin:0 auto;padding:1.5rem;}
  .page-wide{max-width:760px;margin:0 auto;padding:1.5rem;}
  .btn{display:inline-flex;align-items:center;gap:5px;border-radius:999px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
  .btn-solid{background:var(--btn-color,#1A1A2E);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--btn-color,#6B7280);color:var(--btn-color,#6B7280);}
  .btn-sm{padding:0.3rem 0.8rem;font-size:12px;}
  .btn-md{padding:0.45rem 1.1rem;font-size:13px;}
  .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
  .card-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem 1.25rem;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 114px);}
  .chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.75rem;padding-bottom:1rem;}
  .chat-msgs::-webkit-scrollbar{display:none;}
  .chat-bubble-user{max-width:80%;padding:0.7rem 1rem;border-radius:16px 16px 4px 16px;font-size:14px;line-height:1.65;white-space:pre-line;}
  .chat-bubble-ai{max-width:80%;padding:0.7rem 1rem;border-radius:16px 16px 16px 4px;font-size:14px;line-height:1.65;white-space:pre-line;background:var(--card);border:1px solid var(--border);}
  .chat-input-wrap{display:flex;gap:0.5rem;padding:0.65rem 0.9rem;background:var(--card);border-radius:16px;border:1px solid var(--border);}
  .chat-input{flex:1;border:none;background:none;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;}
  .study-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
  .section-label{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.75rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.75rem;}
  .filter-bar{display:flex;gap:0.4rem;}
  .filter-btn{padding:0.3rem 0.85rem;border-radius:999px;font-size:12px;border:1px solid var(--border);cursor:pointer;font-family:'Inter',sans-serif;}
  .session-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;text-align:left;display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;}
  .drop-zone{border:2px dashed var(--border);border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all 0.2s;}
  .drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:#F0FFF8;}
  .pending-card{border-radius:14px;padding:0.9rem 1.1rem;}
  .dots{display:flex;gap:5px;padding:0.75rem 1rem;}
  .dot{width:6px;height:6px;border-radius:50%;animation:pulse 0.6s infinite alternate;}
  @keyframes pulse{from{opacity:0.3}to{opacity:1}}
  .send-btn{border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
  .back-btn{background:none;border:none;color:var(--muted);display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
  .import-preview-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1rem;margin-bottom:0.35rem;display:flex;justify-content:space-between;font-size:13px;}
  .success-box{background:#F0FFF8;border:1px solid rgba(45,106,79,0.2);border-radius:12px;padding:0.9rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;}
</style>
</head>
<body>

<div id="app"><div class="loading">Chargement…</div></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://gwavfkfznhvgajkapehq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3YXZma2Z6bmh2Z2Fqa2FwZWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjE1MTIsImV4cCI6MjA4NzgzNzUxMn0.QrVrwxQ1k38KdV9I0PhUFUyRwBwhuEYXXvtYg5ToE5c";
const ANTHROPIC_KEY = (()=>{
  let k = localStorage.getItem("anthropic_key");
  if (!k) {
    k = prompt("Entrez votre clé API Anthropic (sk-ant-...):");
    if (k && k.startsWith("sk-ant-")) localStorage.setItem("anthropic_key", k);
  }
  return k || "";
})();
const MODEL = "claude-sonnet-4-20250514";

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  tab: "import",
  vocabPacks: [],
  savoirSessions: [],
  ready: false,
  // chat vocab
  vocabMsgs: [],
  vocabInput: "",
  vocabLoading: false,
  vocabPending: null,
  // savoir
  activeSessionId: null,
  creatingSession: false,
  newSessionTitle: "",
  // cards tab
  cardsFilter: "all",
  studyPack: null,
  studyIdx: 0,
  studyFlipped: false,
  studyDeck: [],
  studyMastered: 0,
  studyTotal: 0,
  // import
  importStatus: null,
  importPreview: [],
  importDrag: false,
  importTarget: "vocab",
  // coding
  codingPacks: [],
  // newj
  newjPacks: [],
  newjMsgs: [],
  newjInput: "",
  newjLoading: false,
  newjPending: null,
  codingMsgs: [],
  codingInput: "",
  codingLoading: false,
  codingPending: null,
  // edit bloc
  editBloc: null, // {type:'vocab'|'savoir'|'coding', id, name, cards}
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,9);
const shuffle = arr => {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};
const chunk = (arr,n) => { const o=[]; for(let i=0;i<arr.length;i+=n) o.push(arr.slice(i,i+n)); return o; };
const $ = id => document.getElementById(id);
const el = (tag,attrs={},children=[]) => {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{ if(k==="style"&&typeof v==="object") Object.assign(e.style,v); else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v); else e.setAttribute(k,v); });
  children.forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
};

// ─── SUPABASE ────────────────────────────────────────────────────────────────
async function sbGet(table) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`, {
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
  });
  return r.json();
}
async function sbUpsert(table, row) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:"POST",
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
    body:JSON.stringify(row)
  });
}
async function sbDelete(table, id) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:"DELETE",
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
  });
}

// ─── CLAUDE API ──────────────────────────────────────────────────────────────
async function callClaude(messages, system) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens:2000,system,messages})
  });
  const d = await r.json();
  return d.content?.map(b=>b.text||"").join("")||"";
}

// ─── LOAD ────────────────────────────────────────────────────────────────────
async function loadData() {
  const [vp, ss, cp, nj] = await Promise.all([sbGet("vocab_packs"), sbGet("savoir_sessions"), sbGet("coding_packs"), sbGet("newj_packs")]);
  state.vocabPacks = Array.isArray(vp) ? vp.map(r=>({id:r.id,name:r.name,cards:r.cards||[],completions:r.completions||0})) : [];
  state.savoirSessions = Array.isArray(ss) ? ss.map(r=>({id:r.id,title:r.title,messages:r.messages||[],cards:r.cards||[],completions:r.completions||0})) : [];
  state.codingPacks = Array.isArray(cp) ? cp.map(r=>({id:r.id,name:r.name,cards:r.cards||[],completions:r.completions||0})) : [];
  state.newjPacks = Array.isArray(nj) ? nj.map(r=>({id:r.id,name:r.name,cards:r.cards||[],completions:r.completions||0})) : [];
  state.ready = true;
  render();
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
async function savePack(pack) { await sbUpsert("vocab_packs",{id:pack.id,name:pack.name,cards:pack.cards,completions:pack.completions||0}); }
async function saveCodingPack(pack) { await sbUpsert("coding_packs",{id:pack.id,name:pack.name,cards:pack.cards,completions:pack.completions||0}); }
async function saveNewjPack(pack) { await sbUpsert("newj_packs",{id:pack.id,name:pack.name,cards:pack.cards,completions:pack.completions||0}); }
async function saveSession(s) { await sbUpsert("savoir_sessions",{id:s.id,title:s.title,messages:s.messages,cards:s.cards,completions:s.completions||0}); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = $("app");
  app.innerHTML = "";
  if (!state.ready) { app.innerHTML='<div class="loading">Chargement…</div>'; return; }
  if (state.studyPack) { app.appendChild(renderStudy()); return; }
  if (state.editBloc) { app.appendChild(renderEditBloc()); return; }
  app.appendChild(renderTopBar());
  app.appendChild(renderNav());
  const content = document.createElement("div");
  if (state.tab==="import") content.appendChild(renderImport());
  else if (state.tab==="vocab") content.appendChild(renderVocabChat());
  else if (state.tab==="savoir") content.appendChild(renderSavoir());
  else if (state.tab==="coding") content.appendChild(renderCodingChat());
  else if (state.tab==="newj") content.appendChild(renderNewjChat());
  else if (state.tab==="cards") content.appendChild(renderCards());
  app.appendChild(content);
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function renderNav() {
  const totalVocab = state.vocabPacks.reduce((s,p)=>s+p.cards.length,0);
  const totalSavoir = state.savoirSessions.reduce((s,s2)=>s+s2.cards.length,0);
  const totalCoding = state.codingPacks.reduce((s,p)=>s+p.cards.length,0);
  const totalNewj = state.newjPacks.reduce((s,p)=>s+p.cards.length,0);
  const tabs = [
    {id:"import",label:"Importer",icon:"⬆️"},
    {id:"vocab",label:"Vocabulaire",icon:"📖",count:totalVocab},
    {id:"savoir",label:"Savoir",icon:"🏛️",count:totalSavoir},
    {id:"coding",label:"Coding",icon:"💻",count:totalCoding},
    {id:"newj",label:"New J",icon:"💼",count:totalNewj},
    {id:"cards",label:"Mes Cartes",icon:"🗂️",count:totalVocab+totalSavoir+totalCoding+totalNewj},
  ];
  const nav = el("div",{class:"nav"});
  tabs.forEach(t=>{
    const color = t.id==="vocab"?"#2D6A4F":t.id==="savoir"?"#7B4B94":t.id==="coding"?"#1D4ED8":t.id==="newj"?"#D97706":"#1A1A2E";
    const active = state.tab===t.id;
    const btn = el("button",{class:`nav-btn${active?" active":""}`,style:{"--active-color":color,color:active?color:"#6B7280"}},
      [t.icon+" "+t.label]);
    if (t.count>0) {
      const badge = el("span",{class:"badge-count",style:{background:active?color:"#E5E0D8",color:active?"#fff":"#6B7280"}},[String(t.count)]);
      btn.appendChild(badge);
    }
    btn.addEventListener("click",()=>{state.tab=t.id;render();});
    nav.appendChild(btn);
  });
  return nav;
}

// ─── IMPORT TAB ───────────────────────────────────────────────────────────────
function renderImport() {
  const wrap = el("div",{class:"page fade"});
  wrap.appendChild(el("h2",{class:"serif",style:{fontSize:"1.6rem",marginBottom:"0.5rem"}},["Importer mon fichier Excel"]));
  wrap.appendChild(el("p",{style:{color:"#6B7280",marginBottom:"1rem",fontSize:"14px"}},["Format : .xlsx · Col A : Bloc · Col B : Mot · Col C : Déf. 1 · Col D : Déf. 2 (optionnel)"]));

  // Choix de la destination
  const destWrap = el("div",{style:{display:"flex",gap:"0.5rem",marginBottom:"1.5rem",flexWrap:"wrap"}});
  [["vocab","📖 Vocabulaire","#2D6A4F"],["savoir","🏛️ Savoir","#7B4B94"],["coding","💻 Coding","#1D4ED8"],["newj","💼 New J","#D97706"]].forEach(([v,l,c])=>{
    const active = state.importTarget===v;
    const btn = el("button",{class:"btn btn-sm",style:{
      background:active?c:"#fff",
      color:active?"#fff":c,
      border:`1.5px solid ${c}`,
      borderRadius:"999px",
      fontFamily:"Inter,sans-serif",
      fontWeight:"600",
      padding:"0.35rem 1rem"
    }},[l]);
    btn.addEventListener("click",()=>{state.importTarget=v;render();});
    destWrap.appendChild(btn);
  });
  wrap.appendChild(destWrap);

  if (!["preview","done"].includes(state.importStatus)) {
    const zone = el("div",{class:`drop-zone${state.importDrag?" drag":""}`},[

  if (state.importStatus==="error") wrap.appendChild(el("p",{style:{textAlign:"center",color:"#DC2626",marginTop:"1rem"}},["Aucun mot détecté — vérifiez le format."]));

    wrap.appendChild(done);

async function processExcel(file) {
  if (!file) return;
  state.importStatus="reading"; render();
  try {
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    // Lire les en-têtes depuis la première ligne (col C et suivantes = verso)
    const headerRow = rows[0] || [];
    const backHeaders = headerRow.slice(2).map(h=>(h||"").toString().trim()).filter(h=>h);
    // Grouper les cartes par nom de bloc (colonne A)
    const blocs = {};
    const blocOrder = [];
    let currentBloc = null;
    for (const row of rows.slice(1)) {
      const blocRaw=(row[0]||"").toString().trim();
      const mot=(row[1]||"").toString().trim();
      if(!mot) continue;
      // Mettre à jour le bloc courant si colonne A renseignée
      if(blocRaw) currentBloc = blocRaw.replace(/\r?\n|\r/g, " ").trim();
      if(!currentBloc) currentBloc = "Paquet 1";
      // Construire le verso : "Nom de colonne : valeur" pour chaque colonne C+
      const backParts = [];
      for(let i=0; i<backHeaders.length; i++){
        const val=(row[i+2]||"").toString().trim();
        if(val) backParts.push(`${backHeaders[i]} :\n${val}`);
      }
      if(backParts.length===0) continue;
      const back = backParts.join("\n\n");
      if(!blocs[currentBloc]) { blocs[currentBloc]=[]; blocOrder.push(currentBloc); }
      blocs[currentBloc].push({id:uid(),front:mot,back,category:"vocab",createdAt:Date.now()});
    }
    if(blocOrder.length===0){state.importStatus="error";render();return;}
    state.importPreview=blocOrder.map(name=>({id:uid(),name,cards:blocs[name]}));
    state.importStatus="preview"; render();
  } catch(e){console.error(e);state.importStatus="error";render();}
}

async function confirmImport() {
  const target = state.importTarget || "vocab";
  for (const pack of state.importPreview) {
    if (target === "newj") {
      state.newjPacks.push(pack);
      await saveNewjPack(pack);
    } else if (target === "coding") {
      state.codingPacks.push(pack);
      await saveCodingPack(pack);
    } else if (target === "savoir") {
      const session = {id:uid(),title:pack.name,messages:[],cards:pack.cards,completions:0};
      state.savoirSessions.push(session);
      await saveSession(session);
    } else {
      state.vocabPacks.push(pack);
      await savePack(pack);
    }
  }
  state.importStatus="done"; state.importPreview=[]; render();
}

  });
  hdr.appendChild(filters); wrap.appendChild(hdr);

  const vPacks = (state.cardsFilter==="all"||state.cardsFilter==="vocab")?state.vocabPacks:(state.cardsFilter==="savoir"||state.cardsFilter==="coding")?[]:state.vocabPacks;
  const sSessions = (state.cardsFilter==="all"||state.cardsFilter==="savoir")?state.savoirSessions.filter(s=>s.cards.length>0):(state.cardsFilter==="vocab"||state.cardsFilter==="coding")?[]:state.savoirSessions.filter(s=>s.cards.length>0);
  const cPacks = (state.cardsFilter==="all"||state.cardsFilter==="coding")?state.codingPacks:[];
  const njPacks = (state.cardsFilter==="all"||state.cardsFilter==="newj")?state.newjPacks:[];

  if (vPacks.length===0&&sSessions.length===0&&cPacks.length===0&&njPacks.length===0) {
    const empty=el("div",{class:"empty-state"});
    empty.appendChild(el("div",{style:{fontSize:"40px",marginBottom:"0.75rem"}},["📚"]));
    empty.appendChild(el("p",{style:{fontWeight:"500"}},["Aucune carte pour le moment"]));
    empty.appendChild(el("p",{style:{fontSize:"13px",marginTop:"0.25rem"}},["Importez un fichier Excel ou démarrez un chat."]));
    wrap.appendChild(empty); return wrap;
  }

const sortPacks = arr => [...arr].sort((a,b) => (a.completions||0)-(b.completions||0) || (a.name||a.title||"").localeCompare(b.name||b.title||"", undefined, {numeric:true, sensitivity:"base"}));
    if (vPacks.length>0) {
    wrap.appendChild(el("p",{class:"section-label",style:{color:"#2D6A4F"}},["📖 Vocabulaire"]));
    const grid=el("div",{class:"grid",style:{marginBottom:"2rem"}});
    sortPacks(vPacks).forEach(p=>grid.appendChild(renderPackCard(p.name,p.cards.length,p.completions||0,"#2D6A4F",()=>startStudy(p.cards,p.name,"#2D6A4F",p,"vocab"),async()=>{await sbDelete("vocab_packs",p.id);state.vocabPacks=state.vocabPacks.filter(x=>x.id!==p.id);render();},()=>{state.editBloc={type:"vocab",id:p.id};render();})));
    wrap.appendChild(grid);
  }
  if (sSessions.length>0) {
    wrap.appendChild(el("p",{class:"section-label",style:{color:"#7B4B94"}},["🏛️ Savoir"]));
    const grid=el("div",{class:"grid"});
    sortPacks(sSessions).forEach(s=>grid.appendChild(renderPackCard(s.title,s.cards.length,s.completions||0,"#7B4B94",()=>startStudy(s.cards,s.title,"#7B4B94",s,"savoir"),async()=>{s.cards=[];await saveSession(s);render();},()=>{state.editBloc={type:"savoir",id:s.id};render();})));
    wrap.appendChild(grid);
  }
  if (cPacks.length>0) {
    wrap.appendChild(el("p",{class:"section-label",style:{color:"#1D4ED8"}},["💻 Coding"]));
    const grid=el("div",{class:"grid"});
    sortPacks(cPacks).forEach(p=>grid.appendChild(renderPackCard(p.name,p.cards.length,p.completions||0,"#1D4ED8",()=>startStudy(p.cards,p.name,"#1D4ED8",p,"coding"),async()=>{await sbDelete("coding_packs",p.id);state.codingPacks=state.codingPacks.filter(x=>x.id!==p.id);render();},()=>{state.editBloc={type:"coding",id:p.id};render();})));
    wrap.appendChild(grid);
  }
  if (njPacks.length>0) {
    wrap.appendChild(el("p",{class:"section-label",style:{color:"#D97706"}},["💼 New J"]));
    const grid=el("div",{class:"grid"});
    sortPacks(njPacks).forEach(p=>grid.appendChild(renderPackCard(p.name,p.cards.length,p.completions||0,"#D97706",()=>startStudy(p.cards,p.name,"#D97706",p,"newj"),async()=>{await sbDelete("newj_packs",p.id);state.newjPacks=state.newjPacks.filter(x=>x.id!==p.id);render();},()=>{state.editBloc={type:"newj",id:p.id};render();})));
    wrap.appendChild(grid);
  }
  return wrap;
}

function renderPackCard(name, count, completions, color, onStudy, onDelete, onEdit) {
  const card=el("div",{class:"card-box"});
  const top=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.6rem"}});
  const badges=el("div",{style:{display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap"}});
  badges.appendChild(el("span",{class:"badge",style:{background:`${color}18`,color}},[`${count} cartes`]));
  badges.appendChild(el("span",{class:"badge",style:{background:completions>0?"#D1FAE5":"#F5F0E8",color:completions>0?"#065F46":"#6B7280",border:"1px solid #E5E0D8"}},[completions>0?`✓ ${completions}×`:"À faire"]));
  top.appendChild(badges);
  const actions=el("div",{style:{display:"flex",gap:"4px"}});
  if (onEdit) {
    const editBtn=el("button",{style:{background:"none",border:"none",color:"#6B7280",padding:"2px",cursor:"pointer",fontSize:"14px"}},["✏️"]);
    editBtn.addEventListener("click",e=>{e.stopPropagation();onEdit();}); actions.appendChild(editBtn);
  }
  const del=el("button",{style:{background:"none",border:"none",color:"#6B7280",padding:"2px",cursor:"pointer",fontSize:"14px"}},["🗑"]);
  del.addEventListener("click",onDelete); actions.appendChild(del);
  top.appendChild(actions);
  card.appendChild(top);
  card.appendChild(el("p",{class:"serif",style:{fontWeight:"600",fontSize:"1rem",lineHeight:"1.35",marginBottom:"0.75rem"}},[name]));
  const btn=el("button",{class:"btn btn-solid btn-sm",style:{"--btn-color":color}},["↺ Réviser"]);
  btn.addEventListener("click",onStudy);
  card.appendChild(btn);
  return card;
}

// ─── EDIT BLOC ────────────────────────────────────────────────────────────────
function renderEditBloc() {
  const {type, id} = state.editBloc;
  const color = type==="vocab"?"#2D6A4F":type==="coding"?"#1D4ED8":type==="newj"?"#D97706":"#7B4B94";
  const source = type==="vocab"
    ? state.vocabPacks.find(p=>p.id===id)
    : type==="coding"
    ? state.codingPacks.find(p=>p.id===id)
    : type==="newj"
    ? state.newjPacks.find(p=>p.id===id)
    : state.savoirSessions.find(s=>s.id===id);
  if (!source) { state.editBloc=null; render(); return el("div"); }

  const wrap = el("div",{class:"page-wide fade"});

  // Header
  const hdr = el("div",{style:{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem",flexWrap:"wrap"}});
  const back = el("button",{class:"back-btn"},["← Mes Cartes"]);
  back.addEventListener("click",()=>{state.editBloc=null;render();});
  hdr.appendChild(back);
  hdr.appendChild(el("span",{style:{color:"#E5E0D8"}},["·"]));
  hdr.appendChild(el("span",{class:"badge",style:{background:`${color}18`,color}},["✏️ Édition"]));
  wrap.appendChild(hdr);

  // Rename bloc
  const nameBox = el("div",{class:"card-box",style:{marginBottom:"1.25rem"}});
  nameBox.appendChild(el("p",{style:{fontWeight:"700",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",color:"#6B7280",marginBottom:"0.5rem"}},["Nom du bloc"]));
  const nameRow = el("div",{style:{display:"flex",gap:"0.5rem",alignItems:"center"}});
  const nameInp = el("input",{type:"text",style:{flex:"1",border:"1px solid #E5E0D8",borderRadius:"8px",padding:"0.5rem 0.75rem",fontSize:"14px",background:"#F5F0E8",fontFamily:"Inter,sans-serif"}});
  nameInp.value = type==="vocab"?source.name:source.title;
  const saveNameBtn = el("button",{class:"btn btn-solid btn-sm",style:{"--btn-color":color}},["Renommer"]);
  saveNameBtn.addEventListener("click",async()=>{
    const v=nameInp.value.trim();
    if(!v) return;
    if(type==="vocab"){source.name=v;await savePack(source);}else if(type==="coding"){source.name=v;await saveCodingPack(source);}else if(type==="newj"){source.name=v;await saveNewjPack(source);}else{source.title=v;await saveSession(source);}
    render();
  });
  nameRow.append(nameInp,saveNameBtn);
  nameBox.appendChild(nameRow);
  wrap.appendChild(nameBox);

  // Cards list
  wrap.appendChild(el("p",{class:"section-label",style:{color,marginBottom:"0.75rem"}},[`Cartes (${source.cards.length})`]));

  const cardsList = el("div",{style:{display:"flex",flexDirection:"column",gap:"0.6rem",marginBottom:"1.5rem"}});
  source.cards.forEach((c,i)=>{
    const row = el("div",{class:"card-box",style:{position:"relative"}});
    const rowTop = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.6rem"}});
    rowTop.appendChild(el("span",{style:{fontWeight:"600",fontSize:"12px",color:"#6B7280"}},[`Carte ${i+1}`]));
    const delC = el("button",{style:{background:"none",border:"none",color:"#DC2626",cursor:"pointer",fontSize:"13px",fontFamily:"Inter,sans-serif",padding:"2px 6px",borderRadius:"6px"}},["✕ Supprimer"]);
    delC.addEventListener("click",async()=>{
      source.cards.splice(i,1);
      if(type==="vocab") await savePack(source); else if(type==="coding") await saveCodingPack(source); else if(type==="newj") await saveNewjPack(source); else await saveSession(source);
      render();
    });
    rowTop.appendChild(delC);
    row.appendChild(rowTop);
    // Recto
    const rectoLabel = el("p",{style:{fontSize:"11px",fontWeight:"700",color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"3px"}},["Recto (mot / titre)"]);
    const rectoInp = el("input",{type:"text",style:{width:"100%",border:"1px solid #E5E0D8",borderRadius:"8px",padding:"0.4rem 0.7rem",fontSize:"14px",background:"#F5F0E8",fontFamily:"Inter,sans-serif",marginBottom:"0.5rem"}});
    rectoInp.value = c.front||"";
    rectoInp.addEventListener("change",()=>{c.front=rectoInp.value;});
    // Verso
    const versoLabel = el("p",{style:{fontSize:"11px",fontWeight:"700",color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"3px"}},["Verso (définition)"]);
    const versoInp = el("textarea",{style:{width:"100%",border:"1px solid #E5E0D8",borderRadius:"8px",padding:"0.4rem 0.7rem",fontSize:"13px",background:"#F5F0E8",fontFamily:"Inter,sans-serif",lineHeight:"1.5",resize:"vertical",minHeight:"60px"}});
    versoInp.value = c.back||"";
    versoInp.addEventListener("change",()=>{c.back=versoInp.value;});
    // Save card btn
    const saveCardBtn = el("button",{class:"btn btn-outline btn-sm",style:{"--btn-color":color,marginTop:"0.5rem"}},["✓ Enregistrer"]);
    saveCardBtn.addEventListener("click",async()=>{
      c.front=rectoInp.value; c.back=versoInp.value;
      if(type==="vocab") await savePack(source); else if(type==="coding") await saveCodingPack(source); else if(type==="newj") await saveNewjPack(source); else await saveSession(source);
      saveCardBtn.textContent="✓ Sauvegardé";
      setTimeout(()=>saveCardBtn.textContent="✓ Enregistrer",1500);
    });
    row.append(rectoLabel,rectoInp,versoLabel,versoInp,saveCardBtn);
    cardsList.appendChild(row);
  });
  wrap.appendChild(cardsList);

  // Add new card
  const addBox = el("div",{class:"card-box",style:{border:`1.5px dashed ${color}60`}});
  addBox.appendChild(el("p",{style:{fontWeight:"700",fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.07em",color,marginBottom:"0.75rem"}},["+ Ajouter une carte"]));
  const newRectoInp = el("input",{type:"text",placeholder:"Recto (mot / titre)",style:{width:"100%",border:"1px solid #E5E0D8",borderRadius:"8px",padding:"0.4rem 0.7rem",fontSize:"14px",background:"#F5F0E8",fontFamily:"Inter,sans-serif",marginBottom:"0.5rem"}});
  const newVersoInp = el("textarea",{placeholder:"Verso (définition)",style:{width:"100%",border:"1px solid #E5E0D8",borderRadius:"8px",padding:"0.4rem 0.7rem",fontSize:"13px",background:"#F5F0E8",fontFamily:"Inter,sans-serif",lineHeight:"1.5",resize:"vertical",minHeight:"60px",marginBottom:"0.5rem"}});
  const addBtn = el("button",{class:"btn btn-solid btn-sm",style:{"--btn-color":color}},["Ajouter"]);
  addBtn.addEventListener("click",async()=>{
    const f=newRectoInp.value.trim(), b=newVersoInp.value.trim();
    if(!f||!b) return;
    source.cards.push({id:uid(),front:f,back:b});
    if(type==="vocab") await savePack(source); else if(type==="coding") await saveCodingPack(source); else if(type==="newj") await saveNewjPack(source); else await saveSession(source);
    render();
  });
  addBox.append(newRectoInp,newVersoInp,addBtn);
  wrap.appendChild(addBox);
  return wrap;
}

// ─── STUDY MODE ────────────────────────────────────────────────────────────────
function startStudy(cards, name, color, sourceObj, sourceType) {
  state.studyPack={name,color,sourceObj,sourceType};
  state.studyDeck=shuffle([...cards]);
  state.studyIdx=0;
  state.studyFlipped=false;
  state.studyMastered=0;
  state.studyTotal=cards.length;
  render();
}

function renderStudy() {
  const {name,color}=state.studyPack;
  const deck=state.studyDeck;
  const mastered=state.studyMastered;
  const total=state.studyTotal;
  const wrap=el("div",{class:"study-overlay"});

  // Quitter
  const backBtn=el("button",{class:"back-btn",style:{position:"absolute",top:"16px",left:"16px"}},["← Quitter"]);
  backBtn.addEventListener("click",()=>{state.studyPack=null;render();});
  wrap.appendChild(backBtn);

  // Écran de fin
  if (deck.length===0) {
    // Incrémenter le compteur une seule fois (flag pour éviter double-comptage au re-render)
    if (!state.studyPack._completed) {
      state.studyPack._completed = true;
      const src = state.studyPack.sourceObj;
      if (src) {
        src.completions = (src.completions||0) + 1;
        if (state.studyPack.sourceType==="vocab") savePack(src);
        else if (state.studyPack.sourceType==="coding") saveCodingPack(src);
        else if (state.studyPack.sourceType==="newj") saveNewjPack(src);
        else saveSession(src);
      }
    }
    wrap.appendChild(el("div",{style:{fontSize:"56px",marginBottom:"1rem"}},["🎉"]));
    wrap.appendChild(el("p",{class:"serif",style:{fontSize:"1.5rem",fontWeight:"600",marginBottom:"0.5rem",textAlign:"center"}},["Félicitations !"]));
    const src=state.studyPack.sourceObj;
    const compCount=src?src.completions:1;
    wrap.appendChild(el("p",{style:{color:"#6B7280",fontSize:"14px",textAlign:"center",marginBottom:"0.5rem"}},[`Toutes les ${total} cartes retenues !`]));
    wrap.appendChild(el("p",{style:{color:color,fontSize:"13px",fontWeight:"600",textAlign:"center",marginBottom:"1.5rem"}},[`Bloc complété ${compCount} fois au total ✓`]));
    const btn=el("button",{class:"btn btn-solid btn-md",style:{"--btn-color":color}},["↩ Retour aux cartes"]);
    btn.addEventListener("click",()=>{state.studyPack=null;render();});
    wrap.appendChild(btn);
    return wrap;
  }

  const idx=state.studyIdx;
  const card=deck[idx];

  // Barre de progression
  const progWrap=el("div",{style:{width:"100%",maxWidth:"560px",marginBottom:"1rem"}});
  const progInfo=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"#6B7280",marginBottom:"4px"}});
  progInfo.appendChild(document.createTextNode(`${name}`));
  progInfo.appendChild(el("span",{style:{fontWeight:"600",color}},[ `${mastered} / ${total} retenus`]));
  progWrap.appendChild(progInfo);
  const progBar=el("div",{style:{background:"#E5E0D8",borderRadius:"999px",height:"6px",overflow:"hidden"}});
  const progFill=el("div",{style:{background:color,height:"100%",width:`${Math.round((mastered/total)*100)}%`,borderRadius:"999px",transition:"width 0.3s"}});
  progBar.appendChild(progFill); progWrap.appendChild(progBar);
  // badge cartes restantes
  const remBadge=el("div",{style:{textAlign:"right",marginTop:"4px"}});
  remBadge.appendChild(el("span",{style:{fontSize:"11px",background:`${color}18`,color,padding:"2px 8px",borderRadius:"999px",fontWeight:"600"}},[`${deck.length} carte${deck.length>1?"s":""} restante${deck.length>1?"s":""}`]));
  progWrap.appendChild(remBadge);
  wrap.appendChild(progWrap);

  // Carte flip
  const fp=el("div",{class:"fp",style:{width:"100%",maxWidth:"560px",height:"280px",cursor:"pointer"}});
  const fi=el("div",{class:`fi${state.studyFlipped?" flip":""}`,style:{width:"100%",height:"100%"}});
  // Front
  const front=el("div",{class:"ff",style:{background:"#fff",border:"1px solid #E5E0D8",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}});
  const catLabel = color==="#2D6A4F"?"Vocabulaire":color==="#7B4B94"?"Savoir":color==="#1D4ED8"?"Coding":"New J";
  front.appendChild(el("span",{class:"badge",style:{background:`${color}18`,color,position:"absolute",top:"1rem",left:"1rem"}},[catLabel]));
  // Adapter l'affichage selon la longueur du texte
  const wordCount = card.front.trim().split(/\s+/).length;
  const isLong = wordCount >= 50;
  const frontText = el("p",{class:isLong?"":"serif",style:{
    fontSize: isLong?"13px":"1.6rem",
    fontWeight:"600",
    textAlign: isLong?"left":"center",
    lineHeight: isLong?"1.65":"1.4",
    marginTop:"2rem",
    overflowY: isLong?"auto":"visible",
    maxHeight: isLong?"calc(100% - 5rem)":"none",
    width:"100%",
    whiteSpace:"pre-line",
    paddingBottom: isLong?"0.5rem":"0"
  }},[card.front]);
  front.appendChild(frontText);
  front.appendChild(el("p",{style:{position:"absolute",bottom:"1rem",color:"#6B7280",fontSize:"11px"}},["Cliquer pour retourner"]));
  // Back — scrollable si texte long
  const back=el("div",{class:"ff fb",style:{background:color,overflowY:"auto",padding:"1.5rem 1.5rem 1rem",alignItems:"flex-start",justifyContent:"flex-start",display:"block"}});
  back.appendChild(el("p",{style:{color:"#fff",fontSize:"15px",lineHeight:"1.75",textAlign:"center",whiteSpace:"pre-line",margin:"0"}},[card.back]));
  fi.append(front,back);
  fp.appendChild(fi);
  fp.addEventListener("click",()=>{state.studyFlipped=!state.studyFlipped;render();});
  wrap.appendChild(fp);

  // Boutons de révision (visibles seulement après flip)
  if (state.studyFlipped) {
    const btns=el("div",{style:{display:"flex",gap:"1rem",marginTop:"1.25rem"}});
    // ✗ À revoir → repart à la fin
    const revoir=el("button",{class:"btn btn-outline btn-md",style:{"--btn-color":"#DC2626",minWidth:"130px",justifyContent:"center"}},["✗ À revoir"]);
    revoir.addEventListener("click",()=>{
      const card=state.studyDeck.splice(state.studyIdx,1)[0];
      state.studyDeck.push(card); // repart à la fin
      if(state.studyIdx>=state.studyDeck.length) state.studyIdx=0;
      state.studyFlipped=false;
      render();
    });
    // ✓ Retenu → éliminé du deck
    const retenu=el("button",{class:"btn btn-solid btn-md",style:{"--btn-color":color,minWidth:"130px",justifyContent:"center"}},["✓ Retenu"]);
    retenu.addEventListener("click",()=>{
      state.studyDeck.splice(state.studyIdx,1); // éliminé
      state.studyMastered++;
      if(state.studyIdx>=state.studyDeck.length) state.studyIdx=Math.max(0,state.studyDeck.length-1);
      state.studyFlipped=false;
      render();
    });
    btns.append(revoir,retenu);
    wrap.appendChild(btns);
  } else {
    // Navigation simple avant flip
    const nav=el("div",{style:{display:"flex",alignItems:"center",gap:"1.5rem",marginTop:"1.5rem"}});
    const prev=el("button",{style:{background:idx===0?"#E5E0D8":"#fff",border:"1px solid #E5E0D8",borderRadius:"50%",width:"40px",height:"40px",display:"flex",alignItems:"center",justifyContent:"center",cursor:idx===0?"default":"pointer",fontSize:"18px"}},["‹"]);
    if(idx>0) prev.addEventListener("click",()=>{state.studyFlipped=false;state.studyIdx--;render();});
    nav.appendChild(prev);
    const hint=el("span",{style:{fontSize:"13px",color:"#6B7280"}},["Retournez la carte pour évaluer"]);
    nav.appendChild(hint);
    const next=el("button",{style:{background:idx===deck.length-1?"#E5E0D8":"#fff",border:"1px solid #E5E0D8",borderRadius:"50%",width:"40px",height:"40px",display:"flex",alignItems:"center",justifyContent:"center",cursor:idx===deck.length-1?"default":"pointer",fontSize:"18px"}},["›"]);
    if(idx<deck.length-1) next.addEventListener("click",()=>{state.studyFlipped=false;state.studyIdx++;render();});
    nav.appendChild(next);
    wrap.appendChild(nav);
  }
  return wrap;
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
loadData();
</script>
</body>
</html>
